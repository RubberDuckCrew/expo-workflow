name: Test, Build and Release
run-name: Test, Build and Release ${{ inputs['release-version'] }}

on:
  workflow_call:
    inputs:
      release-version:
        description: 'The version to release (e.g., 1.2.3). The "v" prefix is added automatically.'
        required: false
        type: string
      app-name:
        description: "Name of the app (used for Artifacts and Release title)"
        required: false
        type: string
      build-type:
        description: "Type of build (test, build, release)"
        required: false
        type: string
        default: "test"
      working-directory:
        description: "The directory to run the workflow in (relative to the repository root)"
        required: false
        default: "."
        type: string
      java-version:
        description: "Java version for Android build"
        required: false
        type: string
        default: "21"
      gradle-version:
        description: "Gradle version for Android build"
        required: false
        type: string
        default: "9.0.0"
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "24"
      expo-doctor-version:
        description: "expo-doctor version for validating the project"
        required: false
        type: string
      skip-dependency-check:
        description: "Skip checking if dependencies are up to date in expo-doctor"
        required: false
        type: boolean
        default: true
      bot-app-id:
        description: "GitHub App ID for Release creation"
        required: false
        type: string
    secrets:
      BOT_APP_PRIVATE_KEY:
        required: false
      KEY_PASSWORD:
        required: false
      KEYSTORE_PASSWORD:
        required: false
      KEY_ALIAS:
        required: false
      KEYSTORE_BASE64:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, analyze and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs['working-directory'] }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs['node-version'] }}
          cache: npm
          cache-dependency-path: ${{ inputs['working-directory'] }}/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run lint
        run: npm run lint --if-present

      - name: Run Expo Doctor
        run: |
          VERSION_SUFFIX=""
          if [ -n "$EXPO_DOCTOR_VERSION" ]; then
            VERSION_SUFFIX="@$EXPO_DOCTOR_VERSION"
          fi

          npx expo-doctor$VERSION_SUFFIX --verbose
        env:
          EXPO_DOCTOR_SKIP_DEPENDENCY_VERSION_CHECK: ${{ inputs['skip-dependency-check'] && '1' || '0' }}
          EXPO_DOCTOR_VERSION: ${{ inputs['expo-doctor-version'] }}

      - name: Run tests
        run: npm test --if-present

  build:
    name: Build app
    needs: test
    if: ${{ ( startsWith(github.ref, 'refs/tags/')
      || contains(github.event.pull_request.labels.*.name, '⚗️ Request Build')
      || contains(fromJson('["build","release"]'), inputs['build-type']) ) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs['working-directory'] }}

    outputs:
      version_name: ${{ steps.build_options.outputs.version_name }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs['node-version'] }}
          cache: npm
          cache-dependency-path: ${{ inputs['working-directory'] }}/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Resolve build metadata
        id: build_options
        env:
          INPUT_RELEASE_VERSION: ${{ inputs['release-version'] }}
          INPUT_APP_NAME: ${{ inputs['app-name'] }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          version_name="$INPUT_RELEASE_VERSION"
          if [ -z "$version_name" ]; then
            version_name="$(echo "$GITHUB_REF_NAME" | tr / _)_${SHORT_SHA}"
          fi

          app_name="$INPUT_APP_NAME"
          if [ -z "$app_name" ]; then
            app_name="expo-app"
          fi

          {
            echo "app_name=$app_name"
            echo "version_name=$version_name"
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: ${{ inputs['java-version'] }}

      - name: Set up keystore
        id: keystore
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Keystore secret is empty, skipping signing."
            exit 0
          fi

          {
            echo keyPassword=${{ secrets.KEY_PASSWORD }}
            echo storePassword=${{ secrets.KEYSTORE_PASSWORD }}
            echo keyAlias=${{ secrets.KEY_ALIAS }}
          } > android/key.properties
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
          echo "signing_available=true" >> "$GITHUB_OUTPUT"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Android APK locally (using Gradle wrapper)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease ${{ steps.keystore.outputs.signing_available != 'true' && '-PskipSigning=true' || '' }}

      - name: Rename build artifacts
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build-artifacts"
          apk_path="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk_path" ]; then
            echo "Expected APK not found: $apk_path" >&2
            exit 1
          fi
          mv "$apk_path" "$GITHUB_WORKSPACE/build-artifacts/${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}.apk
          path: ${{ github.workspace }}/build-artifacts/${{ inputs['app-name'] }}_${{ steps.build_options.outputs.version_name }}.apk
          archive: false

  post-build:
    name: Post build
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Remove build request label
        if: ${{ contains(github.event.pull_request.labels.*.name, '⚗️ Request Build') && github.event.pull_request.head.repo.fork == false}}
        uses: IamPekka058/removeLabels@82c8d070189f04448d6ffe291a0e398c2a749a09 # v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: "⚗️ Request Build"

      - name: Comment artifact links
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        uses: RubberDuckCrew/artifact2pr@1d2777cac9898de6a6cb16eb32b5c738ea428787 # v1.1.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-if-no-artifacts: true

  release:
    name: Create release
    needs: build
    if: inputs['build-type'] == 'release' && inputs['release-version']
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check if secrets are available
        id: check-secrets
        run: |
          echo "secrets_available=${{
            inputs['bot-app-id'] &&
            secrets.BOT_APP_PRIVATE_KEY &&
            'true' || ''
          }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: ${{ steps.check-secrets.outputs.secrets_available }}
        id: app-token
        with:
          client-id: ${{ inputs['bot-app-id'] }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs['app-name'] }}_${{ needs.build.outputs.version_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          tag_name: "v${{ inputs['release-version'] }}"
          name: "🔖 ${{ inputs['app-name'] || 'Expo App' }} v${{ inputs['release-version'] }}"
          draft: true
          prerelease: false
          files: |
            ${{ inputs['app-name'] }}_${{ needs.build.outputs.version_name }}.apk
